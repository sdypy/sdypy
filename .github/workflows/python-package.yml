name: Testing

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    # The `view` and `model` siblings import pyvistaqt -> qtpy at package
    # import time, so resolving them needs a real Qt binding. Run it headless
    # with Qt's built-in offscreen platform plugin (no X server required).
    env:
      QT_QPA_PLATFORM: offscreen
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install system libraries for headless Qt/VTK
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglx-mesa0 libegl1 libxkbcommon0 libdbus-1-3 \
            libglib2.0-0 libfontconfig1
      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          pip install .
          # PySide6 supplies the Qt binding qtpy needs to import the
          # view/model siblings (abi3 wheels cover the whole 3.12-3.14 matrix).
          pip install pytest flake8 build PySide6-Essentials
      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      - name: Test with pytest
        # pypi_artifacts tests assert conformance of the PUBLISHED PyPI
        # releases; they are a local, release-time gate and do not run here.
        run: pytest -m "not pypi_artifacts"
      - name: Validate distribution build
        run: python -m build
