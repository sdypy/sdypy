name: Testing

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pytest flake8 build
      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      - name: Test with pytest
        # pypi_artifacts tests assert conformance of the PUBLISHED PyPI
        # releases; they are a local, release-time gate and do not run here.
        run: pytest -m "not pypi_artifacts"
      - name: Validate distribution build
        run: python -m build
